<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Match Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0f1117; color:#e0e0e0; min-height:100vh; }

        .header { background:#1a1d2e; padding:16px 20px; border-bottom:1px solid #2a2d3e; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; position:sticky; top:0; z-index:100; }
        .header h1 { font-size:18px; color:#fff; }
        .header select { background:#2a2d3e; color:#e0e0e0; border:1px solid #3a3d4e; padding:8px 12px; border-radius:6px; font-size:13px; min-width:200px; }

        .match-info { display:flex; gap:10px; padding:12px 20px; background:#151722; border-bottom:1px solid #2a2d3e; flex-wrap:wrap; }
        .chip { background:#1e2235; padding:5px 12px; border-radius:16px; font-size:12px; color:#aab; }
        .chip b { color:#f97316; }

        .big-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; padding:16px 20px; }
        @media(max-width:600px) { .big-stats { grid-template-columns:repeat(2,1fr); } }
        .big-stat { text-align:center; background:#1a1d2e; border-radius:10px; padding:14px 8px; border:1px solid #2a2d3e; }
        .big-stat .n { font-size:26px; font-weight:700; color:#f97316; }
        .big-stat .l { font-size:11px; color:#666; margin-top:3px; }

        .section { padding:0 20px 16px; }
        .section-head { font-size:13px; font-weight:700; color:#555; letter-spacing:1.5px; text-transform:uppercase; padding:18px 20px 6px; border-top:1px solid #1a1d2e; margin-top:8px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
        @media(max-width:400px) { .grid { grid-template-columns:1fr; } }
        .card { background:#1a1d2e; border-radius:10px; padding:16px; border:1px solid #2a2d3e; }
        .card h3 { font-size:12px; color:#8b8fa3; margin-bottom:10px; text-transform:uppercase; letter-spacing:.8px; }

        .sr { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #1f2235; font-size:13px; }
        .sr:last-child { border:none; }
        .sl { color:#8b8fa3; }
        .sv { color:#fff; font-weight:600; }
        .sv.o { color:#f97316; } .sv.g { color:#22c55e; } .sv.b { color:#3b82f6; } .sv.c { color:#06b6d4; }

        .court-wrap { display:flex; justify-content:center; }
        .court-wrap svg { max-width:100%; height:auto; }
        .legend-row { display:flex; gap:14px; justify-content:center; font-size:11px; color:#aab; margin:6px 0; }
        .legend-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:middle; }

        .loading { text-align:center; padding:60px 20px; color:#666; font-size:16px; }
        .footer { text-align:center; padding:20px; color:#444; font-size:11px; border-top:1px solid #1a1d2e; margin-top:20px; }

        @media(max-width:900px) { #pg_panels { grid-template-columns:1fr 1fr !important; } }
        @media(max-width:600px) { #pg_panels { grid-template-columns:1fr !important; } }
        #pg_scrubber { -webkit-appearance:none; appearance:none; height:5px; background:#2a2d3e; border-radius:3px; outline:none; }
        #pg_scrubber::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#6366f1; cursor:pointer; }
        #pg_scrubber::-moz-range-thumb { width:16px; height:16px; border-radius:50%; background:#6366f1; border:none; cursor:pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Tennis Match Analysis</h1>
        <select id="sel" onchange="loadMatch(this.value)"><option value="">Select match...</option></select>
    </div>
    <div id="app"><div class="loading">Loading matches...</div></div>
    <div class="footer">Tennis Stats Dashboard | Generated from detection pipeline</div>

<script>
let S = null;
let matchFile = null;
let charts = [];
const CM2FT = 1/30.48;
const CLR = {forehand:'#f97316',backhand:'#3b82f6',serve:'#22c55e',overhead:'#ef4444',unknown:'#6b7280'};
const CC_CLR = '#f97316', DTL_CLR = '#3b82f6';

async function init() {
    try {
        const r = await fetch('data/matches.json'); const d = await r.json();
        const sel = document.getElementById('sel');
        d.matches.forEach(m => { const o=document.createElement('option'); o.value=m.file; o.textContent=`${m.name} (${m.date})`; sel.appendChild(o); });
        if (d.matches.length===1) { sel.value=d.matches[0].file; loadMatch(d.matches[0].file); }
        else { document.getElementById('app').innerHTML='<div class="loading">Select a match above</div>'; }
    } catch(e) { document.getElementById('app').innerHTML='<div class="loading">Error loading matches.json</div>'; }
}

async function loadMatch(file) {
    if (!file) return;
    matchFile = file;
    document.getElementById('app').innerHTML='<div class="loading">Loading...</div>';
    charts.forEach(c=>c.destroy()); charts=[];
    if(PG.timer){clearInterval(PG.timer);PG.timer=null;}
    try { const r=await fetch(file); S=await r.json(); render(); }
    catch(e) { document.getElementById('app').innerHTML=`<div class="loading">Error loading ${file}</div>`; }
}

// ═══ COURT SVG CONSTANTS ═══
const C = { W:200, H:380, P:20 };
const NET_Y = C.P + C.H/2;
const SL_FAR = C.P + C.H*18/78;
const SL_NEAR = NET_Y + C.H*21/78;
const MID_X = C.P + C.W/2;
const SVG_W = C.W + 2*C.P;
const SVG_H = C.H + 2*C.P;

function cx2s(cx) { return C.P + (cx/823)*C.W; }
function cy2s(cy) { return C.P + (cy/2377)*C.H; }
function ft(cm) { return (cm*CM2FT).toFixed(1); }

function courtLines(showFar, showNear) {
    let s = '';
    const L=C.P, R=C.P+C.W, T=C.P, B=C.P+C.H;
    if (showFar) s += `<rect x="${L}" y="${T}" width="${C.W}" height="${NET_Y-T}" fill="#1a3a1a" rx="2"/>`;
    if (showNear) s += `<rect x="${L}" y="${NET_Y}" width="${C.W}" height="${B-NET_Y}" fill="#1a3a1a" rx="2"/>`;
    s += `<rect x="${L}" y="${T}" width="${C.W}" height="${C.H}" fill="none" stroke="#2a5a2a" stroke-width="1.5" rx="2"/>`;
    s += `<line x1="${L}" y1="${NET_Y}" x2="${R}" y2="${NET_Y}" stroke="#fff" stroke-width="2.5"/>`;
    s += `<text x="${MID_X}" y="${NET_Y-3}" fill="#fff" font-size="8" text-anchor="middle" opacity="0.5">NET</text>`;
    if (showFar) {
        s += `<line x1="${L}" y1="${SL_FAR}" x2="${R}" y2="${SL_FAR}" stroke="#fff" stroke-width="0.5" opacity="0.5"/>`;
        s += `<line x1="${MID_X}" y1="${T}" x2="${MID_X}" y2="${NET_Y}" stroke="#fff" stroke-width="0.5" opacity="0.4"/>`;
    }
    if (showNear) {
        s += `<line x1="${L}" y1="${SL_NEAR}" x2="${R}" y2="${SL_NEAR}" stroke="#fff" stroke-width="0.5" opacity="0.5"/>`;
        s += `<line x1="${MID_X}" y1="${NET_Y}" x2="${MID_X}" y2="${B}" stroke="#fff" stroke-width="0.5" opacity="0.4"/>`;
    }
    return s;
}

function svgOpen(w, h) { return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,sans-serif">`; }

const ZONE = {
    O1: { x: C.P+C.W*0.25, y: C.P+C.H*0.12 },
    O2: { x: C.P+C.W*0.75, y: C.P+C.H*0.12 },
    O3: { x: C.P+C.W*0.25, y: (SL_FAR+NET_Y)/2 },
    O4: { x: C.P+C.W*0.75, y: (SL_FAR+NET_Y)/2 },
};
const SIDE = {
    left:  { x: C.P+C.W*0.25, y: C.P+C.H*0.75 },
    right: { x: C.P+C.W*0.75, y: C.P+C.H*0.75 },
};

// ═══ RENDER ═══
async function render() {
    const s=S.shots, r=S.rallies, t=S.timing, mv=S.movement, sw=S.swing, pl=S.placement, dr=S.direction;
    let h = '';

    h += `<div class="match-info">
        <div class="chip">Match: <b>${S.match_id}</b></div>
        <div class="chip">FH/BH: <b>${s.fh_bh_ratio}x</b></div>
        <div class="chip">Cross-court: <b>${dr?dr.cross_court_pct:0}%</b></div>
    </div>`;

    const deepPct = pl.total_bounces_detected>0 ? Math.round(pl.deep_vs_short.deep/pl.total_bounces_detected*100) : 0;

    // ═══ COURT COVERAGE (single section) ═══
    h += `<div class="section-head">Court Coverage</div><div class="section"><div class="grid">`;

    if (dr && dr.total_direction_shots > 0) {
        h += buildDirectionCourt('left', dr);
    }
    h += buildFullCourt(pl, mv);
    if (dr && dr.total_direction_shots > 0) {
        h += buildDirectionCourt('right', dr);
    }
    h += buildStrokesCard(s, sw, dr);

    h += `</div></div>`;

    // ═══ MATCH FLOW ═══
    h += `<div class="section-head">Match Flow</div><div class="section"><div class="grid">`;

    const avgVsMaxRally = r.max_rally_length>0?Math.round(r.avg_shots_per_rally/r.max_rally_length*100):0;
    h += `<div class="card"><h3>Rally Stats</h3>
        <div class="sr"><span class="sl">Avg vs Max Rally</span><span class="sv o">${avgVsMaxRally}%</span></div>
        <div class="sr"><span class="sl">Shot Distribution</span><span class="sv">${s.distribution_pct.forehand||0}% FH / ${s.distribution_pct.backhand||0}% BH</span></div>
        <div class="sr"><span class="sl">Cross-court</span><span class="sv g">${dr?dr.cross_court_pct:0}%</span></div>
        <div class="sr"><span class="sl">Down-the-line</span><span class="sv b">${dr?Math.round(100-dr.cross_court_pct):0}%</span></div>
        <div style="position:relative;height:150px;margin-top:8px"><canvas id="c2"></canvas></div>
    </div>`;

    const fastVsAvg = t.avg_hit_to_bounce_sec>0?Math.round(t.min_hit_to_bounce_sec/t.avg_hit_to_bounce_sec*100):0;
    const leftPct = pl.left_vs_right?(Math.round(pl.left_vs_right.left/(pl.left_vs_right.left+pl.left_vs_right.right)*100)):50;
    h += `<div class="card"><h3>Performance</h3>
        <div class="sr"><span class="sl">Fastest vs Avg Response</span><span class="sv o">${fastVsAvg}%</span></div>
        <div class="sr"><span class="sl">Deep Placement</span><span class="sv g">${deepPct}%</span></div>
        <div class="sr"><span class="sl">Left Court Bias</span><span class="sv c">${leftPct}%</span></div>
        <div class="sr"><span class="sl">Lateral Coverage</span><span class="sv">${mv.court_coverage?Math.round(mv.court_coverage.x_range/823*100):0}%</span></div>
    </div>`;

    h += `</div></div>`;

    // Load poseground data, then build its HTML
    await initPoseground(matchFile);
    h += buildPoseground();

    document.getElementById('app').innerHTML = h;
    if(PG.data){ PG.frameIdx=0; pgDrawFrame(); pgStartPlay(); }

    // ═══ Charts ═══
    charts.push(new Chart('c_donut',{type:'doughnut',data:{labels:Object.keys(s.distribution_pct),datasets:[{data:Object.values(s.distribution_pct),backgroundColor:Object.keys(s.distribution_pct).map(k=>CLR[k]||'#666'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#aaa',font:{size:10},padding:8}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.raw+'%'}}}}}));

    const st2=Object.keys(sw.avg_swing_speed_by_type);
    const maxSpd=Math.max(...Object.values(sw.max_swing_speed_by_type),1);
    charts.push(new Chart('c_swing',{type:'bar',data:{labels:st2,datasets:[{label:'Avg %',data:st2.map(t2=>Math.round(sw.avg_swing_speed_by_type[t2]/maxSpd*100)),backgroundColor:'#3b82f6',borderRadius:3},{label:'Max %',data:st2.map(t2=>Math.round(sw.max_swing_speed_by_type[t2]/maxSpd*100)),backgroundColor:'#f97316',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{max:100,ticks:{color:'#555',font:{size:9},callback:v=>v+'%'},grid:{color:'#1a1d2e'}},x:{ticks:{color:'#555',font:{size:9}},grid:{display:false}}},plugins:{legend:{labels:{color:'#aaa',font:{size:9}}}}}}));

    if(r.rally_lengths){const mxR=Math.max(...r.rally_lengths,1);charts.push(new Chart('c2',{type:'bar',data:{labels:r.rally_lengths.map((_,i)=>`R${i+1}`),datasets:[{data:r.rally_lengths.map(v=>Math.round(v/mxR*100)),backgroundColor:'#f97316',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{max:100,ticks:{color:'#555',callback:v=>v+'%'},grid:{color:'#1a1d2e'}},x:{ticks:{color:'#555'},grid:{display:false}}},plugins:{legend:{display:false}}}}));}
}

// ═══ STROKES CARD (doughnut + counts + swing) ═══
function buildStrokesCard(s, sw, dr) {
    let h = `<div class="card"><h3>Strokes</h3>`;

    // Doughnut
    h += `<div style="position:relative;height:160px"><canvas id="c_donut"></canvas></div>`;

    // Distribution
    Object.entries(s.distribution_pct).forEach(([k,v]) => {
        h += `<div class="sr"><span class="sl">${k}</span><span class="sv">${v}%</span></div>`;
    });
    h += `<div class="sr"><span class="sl">FH/BH Ratio</span><span class="sv o">${s.fh_bh_ratio}x</span></div>`;

    // Swing speed
    h += `<div style="margin-top:10px;border-top:1px solid #2a2d3e;padding-top:8px">`;
    h += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Swing Speed</div>`;
    h += `<div style="position:relative;height:130px"><canvas id="c_swing"></canvas></div>`;
    h += `</div>`;

    // Direction by shot type (if available)
    if (dr && dr.by_shot_type) {
        const types2 = Object.keys(dr.by_shot_type).filter(k=>k!=='unknown'&&k!=='serve');
        if (types2.length > 0) {
            h += `<div style="margin-top:8px;border-top:1px solid #2a2d3e;padding-top:8px">`;
            h += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Direction by Shot</div>`;
            types2.forEach(st => {
                const d2 = dr.by_shot_type[st];
                const tot2 = d2.cross_court + d2.down_the_line;
                if (tot2 === 0) return;
                const ccW = Math.max(d2.cross_court/tot2*100, 8);
                h += `<div style="font-size:11px;color:#aab;margin:4px 0 2px;text-transform:capitalize">${st}</div>
                    <div style="display:flex;height:18px;border-radius:4px;overflow:hidden;margin-bottom:2px">
                        <div style="width:${ccW}%;background:${CC_CLR};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:30px">CC ${Math.round(d2.cross_court/tot2*100)}%</div>
                        <div style="width:${100-ccW}%;background:${DTL_CLR};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:30px">DTL ${Math.round(d2.down_the_line/tot2*100)}%</div>
                    </div>`;
            });
            h += `</div>`;
        }
    }

    h += `</div>`;
    return h;
}

// ═══ FULL COURT MAP ═══
function buildFullCourt(pl, mv) {
    const zc = pl.zone_counts;
    const mx = Math.max(...Object.values(zc), 1);
    const zah = mv.zone_at_hit;

    // Extended SVG: court + gap + P5/P6 strip below
    const GAP = 8;
    const P56_H = 50;
    const totalH = SVG_H + GAP + P56_H + 10;

    let svg = svgOpen(SVG_W, totalH);
    svg += courtLines(true, true);



    // Far court: O1-O4 heatmap
    const farZones = [
        { z:1, x:C.P,   y:C.P,    w:C.W/2, h:SL_FAR-C.P,  label:'O1' },
        { z:2, x:MID_X, y:C.P,    w:C.W/2, h:SL_FAR-C.P,  label:'O2' },
        { z:3, x:C.P,   y:SL_FAR, w:C.W/2, h:NET_Y-SL_FAR, label:'O3' },
        { z:4, x:MID_X, y:SL_FAR, w:C.W/2, h:NET_Y-SL_FAR, label:'O4' },
    ];
    farZones.forEach(({z, x, y, w, h: zh, label}) => {
        const count = zc[z]||0;
        svg += `<rect x="${x}" y="${y}" width="${w}" height="${zh}" fill="#f97316" opacity="${count/mx*0.4}" rx="1"/>`;
        svg += `<text x="${x+w/2}" y="${y+zh/2-6}" fill="#aab" font-size="9" text-anchor="middle" font-weight="600">${label}</text>`;
        const pct = pl.total_bounces_detected>0 ? Math.round(count/pl.total_bounces_detected*100) : 0;
        svg += `<text x="${x+w/2}" y="${y+zh/2+10}" fill="#fff" font-size="14" text-anchor="middle" font-weight="700">${pct}%</text>`;
    });

    // Near court: P1-P4 inside the court (between net and near baseline)
    const nearMax = Math.max(zah['P1']||0, zah['P2']||0, zah['P3']||0, zah['P4']||0, 1);
    const nearZones = [
        { z:'P1', x:C.P,   y:NET_Y,   w:C.W/2, h:SL_NEAR-NET_Y, label:'P1', clr:'#22c55e' },
        { z:'P2', x:MID_X, y:NET_Y,   w:C.W/2, h:SL_NEAR-NET_Y, label:'P2', clr:'#22c55e' },
        { z:'P3', x:C.P,   y:SL_NEAR, w:C.W/2, h:C.P+C.H-SL_NEAR, label:'P3', clr:'#06b6d4' },
        { z:'P4', x:MID_X, y:SL_NEAR, w:C.W/2, h:C.P+C.H-SL_NEAR, label:'P4', clr:'#06b6d4' },
    ];
    nearZones.forEach(({z, x, y, w, h: zh, label, clr}) => {
        const count = zah[z]||0;
        svg += `<rect x="${x}" y="${y}" width="${w}" height="${zh}" fill="${clr}" opacity="${count/nearMax*0.3}" rx="1"/>`;
        svg += `<text x="${x+w/2}" y="${y+zh/2-5}" fill="#aab" font-size="8" text-anchor="middle" font-weight="600">${label}</text>`;
        const allZoneTotal = (zah['P1']||0)+(zah['P2']||0)+(zah['P3']||0)+(zah['P4']||0)+(zah['P5']||0)+(zah['P6']||0);
        const nPct = allZoneTotal>0 ? Math.round(count/allZoneTotal*100) : 0;
        svg += `<text x="${x+w/2}" y="${y+zh/2+9}" fill="#fff" font-size="12" text-anchor="middle" font-weight="700">${nPct}%</text>`;
    });

    // P5/P6: separate rectangle below baseline with gap
    const p5y = C.P + C.H + GAP;
    const p5 = zah['P5']||0, p6 = zah['P6']||0;
    const p56Max = Math.max(p5, p6, 1);
    // P5/P6 background
    svg += `<rect x="${C.P}" y="${p5y}" width="${C.W}" height="${P56_H}" fill="#1a3a1a" stroke="#2a5a2a" stroke-width="1" rx="3"/>`;
    svg += `<line x1="${MID_X}" y1="${p5y}" x2="${MID_X}" y2="${p5y+P56_H}" stroke="#fff" stroke-width="0.5" opacity="0.3"/>`;
    // P5 fill
    svg += `<rect x="${C.P}" y="${p5y}" width="${C.W/2}" height="${P56_H}" fill="#f97316" opacity="${p5/p56Max*0.35}" rx="3"/>`;
    svg += `<text x="${C.P+C.W*0.25}" y="${p5y+P56_H*0.4}" fill="#aab" font-size="8" text-anchor="middle" font-weight="600">P5</text>`;
    const p56Total=(zah['P1']||0)+(zah['P2']||0)+(zah['P3']||0)+(zah['P4']||0)+p5+p6||1;
    svg += `<text x="${C.P+C.W*0.25}" y="${p5y+P56_H*0.4+14}" fill="#f97316" font-size="12" text-anchor="middle" font-weight="700">${Math.round(p5/p56Total*100)}%</text>`;
    // P6 fill
    svg += `<rect x="${MID_X}" y="${p5y}" width="${C.W/2}" height="${P56_H}" fill="#3b82f6" opacity="${p6/p56Max*0.35}" rx="3"/>`;
    svg += `<text x="${C.P+C.W*0.75}" y="${p5y+P56_H*0.4}" fill="#aab" font-size="8" text-anchor="middle" font-weight="600">P6</text>`;
    svg += `<text x="${C.P+C.W*0.75}" y="${p5y+P56_H*0.4+14}" fill="#3b82f6" font-size="12" text-anchor="middle" font-weight="700">${Math.round(p6/p56Total*100)}%</text>`;

    // Trajectories: hit → bounce arcs (commented out for now)
    /*
    if (S.trajectories) {
        svg += `<defs><marker id="arr_t" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto"><polygon points="0,0.5 5,2 0,3.5" fill="#fff" opacity="0.5"/></marker></defs>`;
        S.trajectories.forEach(t => {
            // Hit position: same mapping as player dots (including P5/P6 compression)
            let hx = cx2s(t.hit_cx);
            let hy = cy2s(t.hit_cy);
            if (hy > C.P + C.H) { hy = p5y + (hy - C.P - C.H) * 0.5 + 10; }
            hx = Math.max(C.P+2, Math.min(C.P+C.W-2, hx));
            hy = Math.min(p5y + P56_H - 2, hy);
            // Bounce position: clamp to court area (opponent side)
            let bx = Math.max(C.P+2, Math.min(C.P+C.W-2, cx2s(t.bounce_cx)));
            let by = Math.max(C.P+2, Math.min(C.P+C.H-2, cy2s(t.bounce_cy)));
            const clr = CLR[t.shot] || '#666';
            // Smooth curve — control point pulls toward net center for natural arc
            const cpx = (hx + bx) / 2 + (bx - hx) * 0.08;
            const cpy = NET_Y + (by - NET_Y) * 0.3;
            svg += `<path d="M${hx.toFixed(1)},${hy.toFixed(1)} Q${cpx.toFixed(1)},${cpy.toFixed(1)} ${bx.toFixed(1)},${by.toFixed(1)}" fill="none" stroke="${clr}" stroke-width="1.5" opacity="0.45" stroke-dasharray="3,2.5" marker-end="url(#arr_t)"/>`;
            // Landing dot with glow
            svg += `<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="3.5" fill="${clr}" opacity="0.6" stroke="${clr}" stroke-width="0.5" stroke-opacity="0.3"/>`;
        });
    }
    */

    // Bounce landing dots (color coded by shot type)
    if (S.trajectories) {
        S.trajectories.forEach(t => {
            let bx = cx2s(t.bounce_cx), by = cy2s(t.bounce_cy);
            bx = Math.max(C.P+2, Math.min(C.P+C.W-2, bx));
            by = Math.max(C.P+2, Math.min(C.P+C.H-2, by));
            const clr = CLR[t.shot] || '#666';
            svg += `<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="4.5" fill="${clr}" opacity="0.8" stroke="#000" stroke-width="0.4"/>`;
        });
    }

    svg += '</svg>';

    const types = S.trajectories ? [...new Set(S.trajectories.map(t=>t.shot))] : (mv.hit_positions ? [...new Set(mv.hit_positions.map(p=>p.shot))] : []);
    let leg = '<div class="legend-row">';
    types.forEach(t => { leg += `<span><span class="legend-dot" style="background:${CLR[t]||'#666'}"></span>${t}</span>`; });
    leg += '</div>';

    const dsTot=pl.deep_vs_short.deep+pl.deep_vs_short.short||1;
    let stats = `<div style="display:flex;gap:8px;margin-top:6px;justify-content:center">
        <div style="text-align:center;background:#151722;padding:4px 14px;border-radius:4px">
            <div style="font-size:14px;font-weight:700;color:#22c55e">${Math.round(pl.deep_vs_short.deep/dsTot*100)}%</div><div style="font-size:8px;color:#666">Deep</div>
        </div>
        <div style="text-align:center;background:#151722;padding:4px 14px;border-radius:4px">
            <div style="font-size:14px;font-weight:700;color:#3b82f6">${Math.round(pl.deep_vs_short.short/dsTot*100)}%</div><div style="font-size:8px;color:#666">Short</div>
        </div>
    </div>`;

    let cov = '';
    if (mv.court_coverage && mv.court_coverage.x_range) {
        const latPct=Math.round(mv.court_coverage.x_range/823*100);
        const depPct=Math.round(mv.court_coverage.y_range/2377*100);
        cov = `<div style="display:flex;gap:12px;justify-content:center;margin-top:4px;font-size:11px;color:#666">
            <span>Lateral: <b style="color:#aab">${latPct}%</b></span>
            <span>Depth: <b style="color:#aab">${depPct}%</b></span>
        </div>`;
    }

    return `<div class="card"><h3>Court Map</h3><div class="court-wrap">${svg}</div>${leg}${stats}${cov}</div>`;
}

// ═══ DIRECTION COURT (From Left / From Right) ═══
function buildDirectionCourt(side, dr) {
    const sz = dr.side_to_zone[side];
    const totalSide = Object.values(sz).reduce((a,b)=>a+b, 0);
    if (totalSide === 0) return `<div class="card"><h3>From ${side} side</h3><div style="color:#555;text-align:center;padding:20px">No shots</div></div>`;

    const maxC = Math.max(...Object.values(sz), 1);
    const isLeft = side === 'left';

    let svg = svgOpen(SVG_W, SVG_H);
    svg += courtLines(true, true);

    // Highlight player side
    svg += `<rect x="${isLeft ? C.P : MID_X}" y="${NET_Y}" width="${C.W/2}" height="${C.P+C.H-NET_Y}" fill="#fff" opacity="0.06" rx="1"/>`;

    const from = SIDE[side];
    svg += `<circle cx="${from.x}" cy="${from.y}" r="10" fill="#fff" opacity="0.15"/>`;
    const sidePct=dr.total_direction_shots>0?Math.round(totalSide/dr.total_direction_shots*100):0;
    svg += `<text x="${from.x}" y="${from.y+4}" fill="#fff" font-size="10" text-anchor="middle" font-weight="700">${sidePct}%</text>`;
    svg += `<text x="${from.x}" y="${from.y+22}" fill="#aab" font-size="9" text-anchor="middle">${side.toUpperCase()}</text>`;

    svg += `<defs>
        <marker id="ac_${side}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="${CC_CLR}"/></marker>
        <marker id="ad_${side}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="${DTL_CLR}"/></marker>
    </defs>`;

    // Separate CC and DTL arrows — start from OPPOSITE edges so they don't cross
    // CC starts from the cross-court edge of player, DTL from the same-side edge
    const ccStartX = isLeft ? from.x + 12 : from.x - 12;  // CC starts toward opposite side
    const dtlStartX = isLeft ? from.x - 8 : from.x + 8;   // DTL starts toward same side

    ['O1','O2','O3','O4'].forEach(zone => {
        const count = sz[zone] || 0;
        if (count === 0) return;
        const to = ZONE[zone];
        const bounceLeft = (zone === 'O1' || zone === 'O3');
        const isCC = (isLeft && !bounceLeft) || (!isLeft && bounceLeft);
        const clr = isCC ? CC_CLR : DTL_CLR;
        const sw2 = Math.max(2, Math.min(7, (count/maxC)*7));
        const opacity = Math.max(0.5, count/maxC);
        const mid = isCC ? `ac_${side}` : `ad_${side}`;

        const isDeep = (zone === 'O1' || zone === 'O2');
        const startX = isCC ? ccStartX : dtlStartX;
        const startY = from.y - 12;

        // CC: curve toward opposite side; DTL: slight curve staying on same side
        let cpx, cpy;
        if (isCC) {
            // Diagonal curve crossing the court
            const crossDir = isLeft ? 1 : -1;
            cpx = (startX + to.x)/2 + crossDir * (isDeep ? 20 : 12);
            cpy = (startY + to.y)/2 - 10;
        } else {
            // Nearly straight, slight inward curve
            const inDir = isLeft ? -1 : 1;
            cpx = (startX + to.x)/2 + inDir * (isDeep ? 10 : 5);
            cpy = (startY + to.y)/2 + (isDeep ? -15 : 5);
        }

        svg += `<path d="M${startX},${startY} Q${cpx},${cpy} ${to.x},${to.y+10}" fill="none" stroke="${clr}" stroke-width="${sw2}" opacity="${opacity}" marker-end="url(#${mid})"/>`;
        const zPct=totalSide>0?Math.round(count/totalSide*100):0;
        svg += `<text x="${to.x}" y="${to.y+5}" fill="#fff" font-size="14" text-anchor="middle" font-weight="700">${zPct}%</text>`;
        svg += `<text x="${to.x}" y="${to.y-8}" fill="#aab" font-size="9" text-anchor="middle">${zone}</text>`;
    });

    svg += '</svg>';

    const leg = `<div class="legend-row">
        <span><span class="legend-dot" style="background:${CC_CLR}"></span>Cross-court</span>
        <span><span class="legend-dot" style="background:${DTL_CLR}"></span>Down-the-line</span>
    </div>`;

    // CC/DTL summary below arrows
    const ccCount = (isLeft ? (sz.O2||0)+(sz.O4||0) : (sz.O1||0)+(sz.O3||0));
    const dtlCount = totalSide - ccCount;
    const ccPct = totalSide > 0 ? Math.round(ccCount/totalSide*100) : 0;

    let bar = '';
    if (totalSide > 0) {
        bar = `<div style="display:flex;height:20px;border-radius:4px;overflow:hidden;margin-top:4px">
            <div style="width:${Math.max(ccPct,10)}%;background:${CC_CLR};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:28px">CC ${ccPct}%</div>
            <div style="width:${Math.max(100-ccPct,10)}%;background:${DTL_CLR};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:28px">DTL ${100-ccPct}%</div>
        </div>`;
    }

    return `<div class="card"><h3>From ${side} side</h3><div class="court-wrap">${svg}</div>${leg}${bar}</div>`;
}

// ═══ POSEGROUND (renderer only — all data pre-baked in JSON) ═══
const PG_EDGES = [
    ['nose','left_eye'],['nose','right_eye'],['left_eye','left_ear'],['right_eye','right_ear'],
    ['left_shoulder','right_shoulder'],
    ['left_shoulder','left_elbow'],['left_elbow','left_wrist'],
    ['right_shoulder','right_elbow'],['right_elbow','right_wrist'],
    ['left_shoulder','left_hip'],['right_shoulder','right_hip'],['left_hip','right_hip'],
    ['left_hip','left_knee'],['left_knee','left_ankle'],
    ['right_hip','right_knee'],['right_knee','right_ankle']
];
const PG_KP = ['nose','left_eye','right_eye','left_ear','right_ear',
    'left_shoulder','right_shoulder','left_elbow','right_elbow','left_wrist','right_wrist',
    'left_hip','right_hip','left_knee','right_knee','left_ankle','right_ankle'];
const PG_CW=350,PG_CH=450,PG_CX=175,PG_CY=235,PG_FPS=45;
const PG_ICW=280,PG_ICH=450,PG_ICX=140,PG_ICY=220;
const PG_EASE={nose:[0,-120,1],left_eye:[-5,-124,1],right_eye:[5,-124,1],left_ear:[-12,-120,1],right_ear:[12,-120,1],
    left_shoulder:[-35,-85,1],right_shoulder:[35,-85,1],left_elbow:[-50,-35,1],right_elbow:[50,-35,1],
    left_wrist:[-40,10,1],right_wrist:[40,10,1],left_hip:[-25,15,1],right_hip:[25,15,1],
    left_knee:[-28,80,1],right_knee:[28,80,1],left_ankle:[-30,145,1],right_ankle:[30,145,1]};

function pgPtToSeg(px,py,x1,y1,x2,y2){
    const dx=x2-x1,dy=y2-y1,lenSq=dx*dx+dy*dy;
    if(lenSq===0)return Math.sqrt((px-x1)**2+(py-y1)**2);
    let t=((px-x1)*dx+(py-y1)*dy)/lenSq;
    t=Math.max(0,Math.min(1,t));
    return Math.sqrt((px-x1-t*dx)**2+(py-y1-t*dy)**2);
}

function pgDrawInspect(){
    const ic=document.getElementById('pg_ic');if(!ic)return;
    const ctx=ic.getContext('2d');
    ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,PG_ICW,PG_ICH);
    ctx.lineCap='round';
    // Get current frame deviation data
    let devData=null;
    if(PG.data&&PG.selectedHit){
        const hitData=PG.data.hits[PG.selectedHit];
        const idx=PG.frameIdx%(PG.data.golden.length);
        if(hitData&&hitData[idx])devData=hitData[idx].edges;
    }
    for(const[a,b]of PG_EDGES){
        const pa=PG_EASE[a],pb=PG_EASE[b];if(!pa||!pb)continue;
        const x1=pa[0]+PG_ICX,y1=pa[1]+PG_ICY,x2=pb[0]+PG_ICX,y2=pb[1]+PG_ICY;
        const ek=a+'-'+b;
        const sel=PG.selEdges.has(ek);
        const dev=devData?devData[ek]:null;
        ctx.save();
        if(sel){
            const clr=dev?dev.c:'#6366f1';
            const pulse=Math.sin(Date.now()/1000*Math.PI*3)*0.4+0.6;
            ctx.strokeStyle=clr;ctx.lineWidth=5;ctx.globalAlpha=pulse;
            ctx.shadowColor=clr;ctx.shadowBlur=12;
        }else{
            ctx.strokeStyle='#3a3d4e';ctx.lineWidth=2.5;ctx.globalAlpha=0.5;
        }
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        ctx.restore();
    }
    for(const k of PG_KP){
        const p=PG_EASE[k];if(!p)continue;
        const x=p[0]+PG_ICX,y=p[1]+PG_ICY;
        let sel=false;
        for(const[a,b]of PG_EDGES){if((a===k||b===k)&&PG.selEdges.has(a+'-'+b)){sel=true;break;}}
        ctx.fillStyle=sel?'#e0e0e0':'#3a3d4e';ctx.globalAlpha=sel?1:0.5;
        ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // Pink circle on right wrist in inspect
    const rw=PG_EASE.right_wrist;
    if(rw){ctx.strokeStyle='#ec4899';ctx.lineWidth=2;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(rw[0]+PG_ICX,rw[1]+PG_ICY,8,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    ctx.fillStyle='#6366f1';ctx.font='bold 12px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText('Inspect',PG_ICX,22);
    ctx.fillStyle='#444';ctx.font='9px -apple-system,sans-serif';
    ctx.fillText(PG.selEdges.size>0?PG.selEdges.size+' limb(s) selected':'Click a limb',PG_ICX,PG_ICH-12);
}

function pgInspectClick(e){
    const ic=document.getElementById('pg_ic');if(!ic)return;
    const rect=ic.getBoundingClientRect();
    const sx=PG_ICW/rect.width,sy=PG_ICH/rect.height;
    const cx=(e.clientX-rect.left)*sx,cy=(e.clientY-rect.top)*sy;
    let best=null,bestD=Infinity;
    for(const[a,b]of PG_EDGES){
        const pa=PG_EASE[a],pb=PG_EASE[b];if(!pa||!pb)continue;
        const d=pgPtToSeg(cx,cy,pa[0]+PG_ICX,pa[1]+PG_ICY,pb[0]+PG_ICX,pb[1]+PG_ICY);
        if(d<bestD){bestD=d;best=a+'-'+b;}
    }
    if(best&&bestD<18){
        if(PG.selEdges.has(best))PG.selEdges.delete(best);else PG.selEdges.add(best);
        pgDrawInspect();pgDrawFrame();
    }
}

function pgImpose(){PG.imposed=true;pgDrawFrame();pgDrawInspect();
    const b=document.getElementById('pg_impose_btn');if(b)b.style.background='#6366f1';
    const r=document.getElementById('pg_reset_btn');if(r)r.style.background='#2a2d3e';}
function pgReset(){PG.imposed=false;PG.selEdges.clear();pgDrawFrame();pgDrawInspect();
    const b=document.getElementById('pg_impose_btn');if(b)b.style.background='#2a2d3e';
    const r=document.getElementById('pg_reset_btn');if(r)r.style.background='#2a2d3e';}

let PG={playing:false,frameIdx:0,timer:null,allData:null,data:null,selectedType:null,selectedHit:null,selEdges:new Set(),imposed:false};

function pgDrawSkeleton(ctx,kp,color,lw){
    ctx.lineCap='round';
    const hasFilter=PG.imposed&&PG.selEdges.size>0;
    for(const[a,b]of PG_EDGES){
        const pa=kp[a],pb=kp[b];if(!pa||!pb)continue;
        const ek=a+'-'+b;
        const active=!hasFilter||PG.selEdges.has(ek);
        ctx.strokeStyle=active?color:'#2a2d3e';ctx.lineWidth=active?lw:1.5;
        ctx.globalAlpha=active?1:0.25;
        ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);ctx.stroke();
    }
    for(const k of PG_KP){
        const p=kp[k];if(!p)continue;
        let active=!hasFilter;
        if(hasFilter){for(const[a,b]of PG_EDGES){if((a===k||b===k)&&PG.selEdges.has(a+'-'+b)){active=true;break;}}}
        ctx.fillStyle=active?color:'#2a2d3e';ctx.globalAlpha=active?1:0.2;
        ctx.beginPath();ctx.arc(p[0],p[1],3.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
}

function pgDrawDevSkeleton(ctx,frame,elapsed){
    const kp=frame.kp,edges=frame.edges;if(!kp)return;
    ctx.lineCap='round';
    const hasFilter=PG.imposed&&PG.selEdges.size>0;
    for(const[a,b]of PG_EDGES){
        const pa=kp[a],pb=kp[b];if(!pa||!pb)continue;
        const ek=a+'-'+b,dev=edges[ek];
        const active=!hasFilter||PG.selEdges.has(ek);
        ctx.save();
        if(!active){
            ctx.strokeStyle='#2a2d3e';ctx.lineWidth=1.5;ctx.globalAlpha=0.25;
        }else if(dev){
            ctx.strokeStyle=dev.c;ctx.lineWidth=dev.w;
            ctx.shadowColor=dev.c;ctx.shadowBlur=6+Math.sin(elapsed*Math.PI*2)*2;
            ctx.globalAlpha=1;
        }else{ctx.strokeStyle='#a78bfa';ctx.lineWidth=2.5;ctx.globalAlpha=1;}
        ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);ctx.stroke();
        ctx.restore();
    }
    for(const k of PG_KP){
        const p=kp[k];if(!p)continue;
        let active=!hasFilter;
        if(hasFilter){for(const[a,b]of PG_EDGES){if((a===k||b===k)&&PG.selEdges.has(a+'-'+b)){active=true;break;}}}
        if(!active){ctx.fillStyle='#2a2d3e';ctx.globalAlpha=0.2;}
        else{let clr='#a78bfa';for(const[a,b]of PG_EDGES){if(a!==k&&b!==k)continue;const dev=edges[a+'-'+b];if(dev)clr=dev.c;}
        ctx.fillStyle=clr;ctx.globalAlpha=1;}
        ctx.beginPath();ctx.arc(p[0],p[1],3.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
}

function pgDrawFrame(){
    if(!PG.data)return;
    const gc=document.getElementById('pg_gc'),pc=document.getElementById('pg_pc');
    if(!gc||!pc)return;
    const gCtx=gc.getContext('2d'),pCtx=pc.getContext('2d');
    const D=PG.data,total=D.golden.length,idx=PG.frameIdx%total;
    const gKp=D.golden[idx];
    const hitData=D.hits[PG.selectedHit];
    const pFrame=hitData?hitData[idx]:null;

    [gCtx,pCtx].forEach(c=>{c.fillStyle='#0a0a12';c.fillRect(0,0,PG_CW,PG_CH);});
    [gCtx,pCtx].forEach(c=>{
        c.strokeStyle='#1a2a1a';c.lineWidth=1;c.setLineDash([4,4]);
        c.beginPath();c.moveTo(30,PG_CY+130);c.lineTo(PG_CW-30,PG_CY+130);c.stroke();c.setLineDash([]);
    });

    if(gKp)pgDrawSkeleton(gCtx,gKp,'#2563eb',3);
    if(pFrame)pgDrawDevSkeleton(pCtx,pFrame,Date.now()/1000);

    // Pink circle on right wrist (dominant hand marker)
    if(gKp&&gKp.right_wrist){gCtx.strokeStyle='#ec4899';gCtx.lineWidth=2;gCtx.globalAlpha=0.8;gCtx.beginPath();gCtx.arc(gKp.right_wrist[0],gKp.right_wrist[1],8,0,Math.PI*2);gCtx.stroke();gCtx.globalAlpha=1;}
    if(pFrame&&pFrame.kp&&pFrame.kp.right_wrist){pCtx.strokeStyle='#ec4899';pCtx.lineWidth=2;pCtx.globalAlpha=0.8;pCtx.beginPath();pCtx.arc(pFrame.kp.right_wrist[0],pFrame.kp.right_wrist[1],8,0,Math.PI*2);pCtx.stroke();pCtx.globalAlpha=1;}

    const rel=idx+D.frame_range[0];
    const phase=rel<-5?'PREPARATION':rel<=5?'CONTACT':'FOLLOW-THROUGH';
    const phC=rel<-5?'#6b7280':rel<=5?'#22c55e':'#06b6d4';

    gCtx.fillStyle='#2563eb';gCtx.font='bold 13px -apple-system,sans-serif';
    gCtx.textAlign='center';gCtx.fillText('Golden Posture',PG_CX,24);
    pCtx.fillStyle='#a78bfa';pCtx.font='bold 13px -apple-system,sans-serif';
    pCtx.textAlign='center';pCtx.fillText('Your Posture',PG_CX,24);
    pCtx.fillStyle='#555';pCtx.font='10px monospace';pCtx.fillText(PG.selectedHit||'',PG_CX,40);

    [gCtx,pCtx].forEach(c=>{
        c.fillStyle=phC;c.font='bold 10px -apple-system,sans-serif';c.textAlign='center';
        c.fillText(phase,PG_CX,PG_CH-28);
        c.fillStyle='#555';c.font='11px monospace';
        c.fillText('Frame '+(rel>=0?'+':'')+rel,PG_CX,PG_CH-12);
    });
    if(rel===0)[gCtx,pCtx].forEach(c=>{c.strokeStyle='#22c55e';c.lineWidth=2;c.globalAlpha=0.4;c.strokeRect(4,4,PG_CW-8,PG_CH-8);c.globalAlpha=1;});

    pgDrawInspect();
    const scrub=document.getElementById('pg_scrubber');if(scrub)scrub.value=idx;
    const cnt=document.getElementById('pg_fnum');if(cnt)cnt.textContent=(rel>=0?'+':'')+rel;
}

function pgTick(){PG.frameIdx++;pgDrawFrame();}
function pgStartPlay(){if(PG.timer)return;PG.playing=true;PG.timer=setInterval(pgTick,1000/PG_FPS);const b=document.getElementById('pg_pbtn');if(b)b.innerHTML='&#9646;&#9646;';}
function pgStopPlay(){PG.playing=false;if(PG.timer){clearInterval(PG.timer);PG.timer=null;}const b=document.getElementById('pg_pbtn');if(b)b.innerHTML='&#9654;';}
function pgToggle(){PG.playing?pgStopPlay():pgStartPlay();}
function pgOnScrub(v){pgStopPlay();PG.frameIdx=parseInt(v);pgDrawFrame();}

function pgOnHitSelect(id){
    PG.selectedHit=id;PG.frameIdx=0;PG.imposed=false;PG.selEdges.clear();
    const pc=document.getElementById('pg_pc');
    if(pc){const c=pc.getContext('2d');c.fillStyle='#a78bfa';c.globalAlpha=0.3;c.fillRect(0,0,PG_CW,PG_CH);c.globalAlpha=1;}
    setTimeout(()=>pgDrawFrame(),100);
    if(PG.data)(Object.keys(PG.data.hits)).forEach(h=>{
        const el=document.getElementById('pg_chip_'+h);if(el)el.style.background=h===id?'#6366f1':'#2a2d3e';
    });
    if(!PG.playing)pgStartPlay();
}

function buildPoseground(){
    if(!PG.allData)return '';
    return '<div class="section-head">Poseground</div><div class="section"><div id="pg_container" class="card" style="max-width:820px;margin:0 auto">'+buildPosegroundInner()+'</div></div>';
}

function buildPosegroundInner(){
    if(!PG.data)return '';
    const D=PG.data,total=D.golden.length,hitIds=Object.keys(D.hits);
    const fmin=D.frame_range[0],fmax=D.frame_range[1];
    const types=Object.keys(PG.allData);
    let chips=hitIds.map((h,i)=>`<button id="pg_chip_${h}" onclick="pgOnHitSelect('${h}')" style="padding:6px 14px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #3a3d4e;color:#e0e0e0;font-family:monospace;background:${i===0?'#6366f1':'#2a2d3e'}">${h}</button>`).join('');
    let typeOpts=types.map(t=>`<option value="${t}" ${t===PG.selectedType?'selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('');
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
            <h3 style="margin:0;font-size:14px;color:#e0e0e0;letter-spacing:.5px">POSE ANALYSIS</h3>
            <select onchange="pgOnShotType(this.value)" style="background:#2a2d3e;color:#e0e0e0;border:1px solid #3a3d4e;padding:6px 10px;border-radius:6px;font-size:12px">${typeOpts}</select>
            <span style="font-size:10px;color:#555;margin-left:auto">Right-handed</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <span style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px">Hits:</span>${chips}
        </div>
        <div id="pg_panels" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div style="border-radius:8px;overflow:hidden;border:1px solid #1e2235;background:#0a0a12">
                <canvas id="pg_gc" width="${PG_CW}" height="${PG_CH}" style="width:100%;height:auto;display:block"></canvas>
            </div>
            <div style="border-radius:8px;overflow:hidden;border:1px solid #1e2235;background:#0a0a12">
                <canvas id="pg_pc" width="${PG_CW}" height="${PG_CH}" style="width:100%;height:auto;display:block"></canvas>
            </div>
            <!-- INSPECT PANEL (hidden for now, restore by uncommenting + changing grid to 1fr 1fr auto)
            <div style="display:flex;flex-direction:column;gap:6px">
                <div style="border-radius:8px;overflow:hidden;border:1px solid #1e2235;background:#0a0a12;flex:1">
                    <canvas id="pg_ic" width="${PG_ICW}" height="${PG_ICH}" style="width:100%;height:auto;display:block;cursor:pointer" onclick="pgInspectClick(event)"></canvas>
                </div>
                <div style="display:flex;gap:6px">
                    <button id="pg_impose_btn" onclick="pgImpose()" style="flex:1;padding:6px;border-radius:6px;background:#2a2d3e;border:1px solid #3a3d4e;color:#e0e0e0;font-size:10px;cursor:pointer;font-weight:600">Impose</button>
                    <button id="pg_reset_btn" onclick="pgReset()" style="flex:1;padding:6px;border-radius:6px;background:#2a2d3e;border:1px solid #3a3d4e;color:#e0e0e0;font-size:10px;cursor:pointer;font-weight:600">Reset</button>
                </div>
            </div>
            -->
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:10px;background:#151722;padding:10px 14px;border-radius:8px;border:1px solid #2a2d3e">
            <button id="pg_pbtn" onclick="pgToggle()" style="width:34px;height:34px;border-radius:50%;background:#2a2d3e;border:1px solid #3a3d4e;color:#e0e0e0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center">&#9654;</button>
            <div style="flex:1">
                <input type="range" id="pg_scrubber" min="0" max="${total-1}" value="0" oninput="pgOnScrub(this.value)" style="width:100%">
                <div style="display:flex;justify-content:space-between;font-size:9px;color:#555;margin-top:2px">
                    <span>${fmin}</span><span style="color:#22c55e;font-weight:600">Hit (0)</span><span>+${fmax}</span>
                </div>
            </div>
            <span id="pg_fnum" style="font-family:monospace;font-size:13px;color:#888;min-width:35px;text-align:right">${fmin}</span>
        </div>
        <div style="display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:11px;color:#666">
            <span><span style="display:inline-block;width:12px;height:3px;background:#2563eb;vertical-align:middle;margin-right:4px;border-radius:2px"></span>Golden</span>
            <span style="color:#444">|</span>
            <span><span style="display:inline-block;width:10px;height:3px;background:#22c55e;vertical-align:middle;margin-right:3px;border-radius:2px"></span>&lt;10&deg;</span>
            <span><span style="display:inline-block;width:10px;height:3px;background:#f97316;vertical-align:middle;margin-right:3px;border-radius:2px"></span>10-20&deg;</span>
            <span><span style="display:inline-block;width:10px;height:3px;background:#eab308;vertical-align:middle;margin-right:3px;border-radius:2px"></span>20-35&deg;</span>
            <span><span style="display:inline-block;width:10px;height:3px;background:#ef4444;vertical-align:middle;margin-right:3px;border-radius:2px"></span>&gt;35&deg;</span>
        </div>`;
}

function pgOnShotType(type){
    if(!PG.allData||!PG.allData[type])return;
    pgStopPlay();
    PG.selectedType=type;
    PG.data=PG.allData[type];
    const hitIds=Object.keys(PG.data.hits);
    PG.selectedHit=hitIds[0]||null;
    PG.frameIdx=0;
    // Re-render poseground section
    const container=document.getElementById('pg_container');
    if(container)container.innerHTML=buildPosegroundInner();
    pgDrawFrame();pgStartPlay();
}

async function initPoseground(matchDir){
    if(PG.timer){clearInterval(PG.timer);PG.timer=null;}
    PG.allData=null;PG.data=null;PG.selectedType=null;PG.selectedHit=null;
    if(!matchDir)return;
    const dir=matchDir.substring(0,matchDir.lastIndexOf('/'));
    try{
        const r=await fetch(dir+'/poseground.json');
        if(!r.ok)return;
        PG.allData=await r.json();
        const types=Object.keys(PG.allData);
        if(!types.length)return;
        // Default to forehand if available, else first
        PG.selectedType=types.includes('forehand')?'forehand':types[0];
        PG.data=PG.allData[PG.selectedType];
        const hitIds=Object.keys(PG.data.hits);
        PG.selectedHit=hitIds[0]||null;
    }catch(e){return;}
}

init();
</script>
</body>
</html>
